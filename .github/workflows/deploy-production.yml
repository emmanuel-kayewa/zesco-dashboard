name: Deploy to Production

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Deploy to Production Server
    runs-on: [self-hosted, production]
    
    steps:
      - name: Deploy to Production Server
        working-directory: ${{ secrets.PROD_APP_PATH }}
        run: |
            echo "🔄 Pulling latest code from main branch..."
            git pull origin main
            
            echo "📦 Installing Composer dependencies..."
            composer install --no-dev --optimize-autoloader --no-interaction --prefer-dist
            
            echo "📦 Installing NPM dependencies..."
            npm ci
            
            echo "🏗️ Building frontend assets..."
            npm run build
            
            echo "🔧 Running database migrations..."
            php artisan migrate --force
            
            echo "🧹 Clearing caches..."
            php artisan config:clear || true
            php artisan route:clear || true
            
            # Clear cache with fallback to manual deletion
            php artisan cache:clear || {
              echo "⚠️  Cache clear failed, manually removing cache files..."
              find storage/framework/cache/data -type f -delete 2>/dev/null || true
            }
            
            # Clear view cache with fallback
            php artisan view:clear || {
              echo "⚠️  View clear failed, manually removing view files..."
              find storage/framework/views -type f -name "*.php" -delete 2>/dev/null || true
            }
            
            echo "💾 Caching configuration..."
            php artisan config:cache
            php artisan route:cache
            php artisan view:cache
            
            echo "🔗 Optimizing application..."
            php artisan optimize
            
            echo "📋 Restarting queue workers..."
            php artisan queue:restart
            
            echo "✅ Deployment completed successfully!"
      
      - name: Notify Deployment Status
        if: always()
        run: |
          if [ "${{ job.status }}" == "success" ]; then
            echo "✅ Production deployment successful!"
          else
            echo "❌ Production deployment failed!"
          fi
